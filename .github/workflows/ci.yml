name: CI

on:
  push:
    branches: [main]
  pull_request:

# Allow the deploy job to push to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # The build is the only thing that catches SSR violations
      # (direct window/localStorage access outside useEffect).
      - run: npm run build
      # Stash the build so the deploy job doesn't rebuild it.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    # Only publish from main; PRs just test + build above.
    if: github.ref == 'refs/heads/main'
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
